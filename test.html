<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STMU Admission Test — In Progress</title>
<style>
  :root{
    --bg: #060b12;
    --line: #16283a;
    --cyan: #35e6c4;
    --cyan-dim: #1d8a76;
    --text: #d7e6ea;
    --muted: #6f8a94;
  }
  * { box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Consolas','SFMono-Regular','Courier New',monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 18px;
    position: relative;
    overflow-x: hidden;
  }

  .grid-bg{
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 42px 42px;
    opacity: 0.35;
    animation: drift 18s linear infinite;
    pointer-events: none;
  }
  @keyframes drift {
    from { background-position: 0 0; }
    to   { background-position: 42px 42px; }
  }
  .glow{
    position: fixed;
    width: 700px; height: 700px;
    top: -260px; right: -260px;
    background: radial-gradient(circle, rgba(53,230,196,0.12), transparent 70%);
    pointer-events: none;
  }
  .glow2{
    position: fixed;
    width: 600px; height: 600px;
    bottom: -220px; left: -220px;
    background: radial-gradient(circle, rgba(77,139,255,0.10), transparent 70%);
    pointer-events: none;
  }
  .scanline{
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.5;
    animation: scan 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scan {
    0%   { top: 0%; opacity: 0; }
    10%  { opacity: 0.6; }
    50%  { top: 100%; opacity: 0.6; }
    60%  { opacity: 0; }
    100% { top: 100%; opacity: 0; }
  }
  .cursor-glow{
    position: fixed;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(53,230,196,0.35), rgba(53,230,196,0.08) 45%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
    transition: opacity 0.3s;
    mix-blend-mode: screen;
  }
  .cursor-core{
    position: fixed;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(53,230,196,0.55), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
    filter: blur(2px);
  }

  header{
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 18px;
    width: 100%;
    max-width: 820px;
  }
  .uni-badge{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 15px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(53,230,196,0.04);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .uni-badge::before{
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.35; }
  }
  h1{
    font-size: 19px;
    font-weight: 700;
    margin: 0 0 5px;
  }
  h1 a{ color: var(--text); text-decoration: none; border-bottom: 1px dashed var(--cyan-dim); }
  h1 a:hover{ color: var(--cyan); }
  p.loc{ margin:0; font-size: 10.5px; color: var(--muted); letter-spacing: 0.08em; }

  .frame-wrap{
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 820px;
    background: linear-gradient(180deg, #0b141f, #0a1119);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(53,230,196,0.05), 0 30px 60px rgba(0,0,0,0.55), 0 0 40px rgba(53,230,196,0.04);
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .frame-bar{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #0a121b;
    border-bottom: 1px solid var(--line);
  }
  .dot{ width:10px; height:10px; border-radius:50%; opacity:0.85; }
  .dot.r{ background:#ff5f56; }
  .dot.y{ background:#ffbd2e; }
  .dot.g{ background:#27c93f; }
  .frame-title{ margin-left: 8px; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }

  iframe{
    width: 100%;
    min-height: 78vh;
    border: none;
    background: #fff;
  }

  footer{
    position: relative;
    z-index: 2;
    margin-top: 16px;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    line-height: 1.7;
  }
  footer .lock{ color: var(--cyan-dim); }

  @media (max-width: 600px){
    iframe{ min-height: 82vh; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>
<div class="glow2"></div>
<div class="scanline"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="cursor-core" id="cursorCore"></div>

<header>
  <h1><a href="https://stmu.edu.pk/" target="_blank" rel="noopener">Shifa Tameer-e-Millat University (STMU)</a></h1>
  <p class="loc">ISLAMABAD · OFFICE OF ADMISSIONS</p>
</header>

<div class="frame-wrap">
  <div class="frame-bar">
    <span class="dot r"></span>
    <span class="dot y"></span>
    <span class="dot g"></span>
    <span class="frame-title">admission-test.form ~ active</span>
  </div>
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdfXMofzSlPS_0tYjx0KeeAtwprrEDjwopsDPXJC9LwD4tc2w/viewform?embedded=true" loading="lazy">Loading…</iframe>
</div>

<footer>
  <span class="lock">&#128274;</span> Encrypted session · Authorized candidates only<br>
  © <span id="year"></span> Shifa Tameer-e-Millat University
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  const glow = document.getElementById('cursorGlow');
  const core = document.getElementById('cursorCore');
  window.addEventListener('mousemove', (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
    core.style.left = e.clientX + 'px';
    core.style.top = e.clientY + 'px';
  });
</script>
</body>
</html>
